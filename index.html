<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Daily Report</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .tab-navigation {
            display: flex;
            background: rgba(0,0,0,0.3);
            border-bottom: 2px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 10px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }
        .tab-btn.active {
            color: #10b981;
            border-bottom-color: #10b981;
            background: rgba(16,185,129,0.1);
        }
        .tab-content { display: none; padding: 12px; }
        .tab-content.active { display: block; }
        .header {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header .date { font-size: 12px; color: #aaa; }
        .sector {
            margin-bottom: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.02);
            overflow: hidden;
        }
        .sector-header {
            background: rgba(255,255,255,0.08);
            padding: 12px 14px;
            font-weight: 600;
            font-size: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .stock-item {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
        }
        .stock-item:last-child { border-bottom: none; }
        .stock-name { font-weight: 600; font-size: 14px; }
        .stock-data { text-align: right; }
        .price { font-weight: bold; font-size: 15px; }
        .positive { color: #10b981; }
        .negative { color: #ef4444; }
        .update { text-align: center; font-size: 10px; color: #10b981; padding: 8px; }
        .loading { text-align: center; color: #aaa; padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="update" id="updateTime">⏳ Laden...</div>
        <div class="tab-navigation">
            <button class="tab-btn active" onclick="switchTab(0)">📊 Finance Report</button>
            <button class="tab-btn" onclick="switchTab(1)">📰 Top News</button>
            <button class="tab-btn" onclick="switchTab(2)">📈 Prognose</button>
        </div>
        
        <div class="tab-content active">
            <div class="header">
                <h1>📊 Finance Daily Report</h1>
                <div class="date" id="dateInfo">Laden...</div>
            </div>
            
            <div id="stocksContainer" class="loading">⏳ Kurse werden geladen...</div>
        </div>
        
        <div class="tab-content">
            <div class="header"><h1>📰 Top News</h1></div>
            <div style="padding: 20px; text-align: center; color: #aaa;">📊 News werden täglich aktualisiert</div>
        </div>
        
        <div class="tab-content">
            <div class="header"><h1>📈 Marktprognose</h1></div>
            <div style="padding: 20px; text-align: center; color: #aaa;">📈 Prognosen werden täglich aktualisiert</div>
        </div>
    </div>
    
    <script>
        const STOCKS = {
            'AAPL': 'Apple', 'MSFT': 'Microsoft', 'NVDA': 'Nvidia',
            'INTC': 'Intel', 'ASML': 'Asml', 'ORCL': 'Oracle',
            'JPM': 'JP Morgan', 'MA': 'Mastercard', 'GS': 'Goldman Sachs',
            'NOC': 'Northrop Grumman', 'LMT': 'Lockheed Martin', 'RYCEY': 'Rolls Royce',
            'SIE.DE': 'Siemens', 'CAT': 'Caterpillar', 'TKA.DE': 'Thyssenkrupp',
            'XOM': 'Exxon Mobil', 'BYD': 'BYD',
            'NOVO.CO': 'Novo Nordisk', 'MRNA': 'Moderna', 'UNH': 'UnitedHealth',
            'AMZN': 'Amazon', 'NKE': 'Nike', 'TSLA': 'Tesla'
        };

        const SECTORS = {
            'Tech': ['Apple', 'Microsoft', 'Nvidia', 'Intel', 'Asml', 'Oracle'],
            'Finance': ['JP Morgan', 'Mastercard', 'Goldman Sachs'],
            'Defense': ['Northrop Grumman', 'Lockheed Martin', 'Rolls Royce'],
            'Industry': ['Siemens', 'Caterpillar', 'Thyssenkrupp'],
            'Energy': ['Exxon Mobil', 'BYD'],
            'Pharma': ['Novo Nordisk', 'Moderna', 'UnitedHealth'],
            'Consumer': ['Amazon', 'Nike'],
            'Mobility': ['Tesla']
        };

        const ICONS = {
            'Tech': '💻',
            'Finance': '🏦',
            'Defense': '🚀',
            'Industry': '🏭',
            'Energy': '⚡',
            'Pharma': '💊',
            'Consumer': '🛍️',
            'Mobility': '🚗'
        };

        async function getStockData(ticker) {
            try {
                const response = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=5d`);
                const data = await response.json();
                const quotes = data.chart.result[0].indicators.quote[0];
                const closes = quotes.close.filter(x => x);
                
                if (closes.length >= 2) {
                    const current = closes[closes.length - 1];
                    const previous = closes[closes.length - 2];
                    const change = ((current - previous) / previous) * 100;
                    
                    return {
                        price: current.toFixed(2),
                        change: change.toFixed(2),
                        arrow: change >= 0 ? '↑' : '↓',
                        color: change >= 0 ? 'positive' : 'negative'
                    };
                }
            } catch (e) {
                console.log(`Error for ${ticker}`);
            }
            return null;
        }

        async function loadAllStocks() {
            const stocks = {};
            
            for (const [ticker, name] of Object.entries(STOCKS)) {
                const data = await getStockData(ticker);
                if (data) {
                    stocks[name] = data;
                }
            }
            
            renderStocks(stocks);
            updateTime();
        }

        function renderStocks(stocks) {
            let html = '';
            
            for (const [sector, names] of Object.entries(SECTORS)) {
                html += `<div class="sector">
                    <div class="sector-header">${ICONS[sector]} ${sector.toUpperCase()}</div>`;
                
                for (const name of names) {
                    if (stocks[name]) {
                        const s = stocks[name];
                        html += `<div class="stock-item">
                            <div class="stock-name">${name}</div>
                            <div class="stock-data">
                                <div class="price">${s.price}€</div>
                                <div class="${s.color}">${s.arrow} ${Math.abs(s.change)}%</div>
                            </div>
                        </div>`;
                    }
                }
                html += '</div>';
            }
            
            document.getElementById('stocksContainer').innerHTML = html;
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('updateTime').textContent = `✅ Aktualisiert: ${now.toLocaleString('de-DE')} Uhr`;
            
            const yesterday = new Date(now);
            yesterday.setDate(yesterday.getDate() - 1);
            const dateStr = now.toLocaleDateString('de-DE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const yesterdayStr = yesterday.toLocaleDateString('de-DE');
            
            document.getElementById('dateInfo').textContent = `${dateStr} • Daten vom ${yesterdayStr}`;
        }

        function switchTab(i) {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.tab-content')[i].classList.add('active');
            document.querySelectorAll('.tab-btn')[i].classList.add('active');
            window.scrollTo(0, 0);
        }

        // Laden beim Start
        loadAllStocks();
        
        // Alle 30 Sekunden neu laden
        setInterval(loadAllStocks, 30000);
    </script>
</body>
</html>
